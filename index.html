<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX Newsletter Signup Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-900 text-neutral-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-neutral-800 rounded-lg shadow-xl p-8 max-w-sm w-full border border-neutral-700">
        <h2 class="text-2xl font-bold mb-4 text-center text-blue-400">Subscribe to APEX</h2>
        <p class="text-center text-neutral-300 mb-6">Get our latest updates and exclusive content!</p>
        <form class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-neutral-400 mb-1">Email address</label>
                <input type="email" id="email" name="email" placeholder="your@example.com" required
                       class="w-full px-4 py-2 bg-neutral-700 border border-neutral-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-neutral-100">
            </div>
            <div>
                <label for="name" class="block text-sm font-medium text-neutral-400 mb-1">Name (optional)</label>
                <input type="text" id="name" name="name" placeholder="John Doe"
                       class="w-full px-4 py-2 bg-neutral-700 border border-neutral-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-neutral-100">
            </div>
            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-md transition duration-300 ease-in-out focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-neutral-800">
                Subscribe
            </button>
            <p class="text-xs text-neutral-500 text-center mt-4">No spam, we promise!</p>
        </form>
    </div>
</body>
</html>
